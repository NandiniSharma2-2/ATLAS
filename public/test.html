<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Server Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 25% 25%, #4ade80 0%, transparent 50%),
                              radial-gradient(circle at 75% 75%, #06d6a0 0%, transparent 50%);
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
        }
        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #4ade80, #06d6a0);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 24px;
        }
        h1 {
            margin: 0 0 1rem;
            background: linear-gradient(135deg, #4ade80, #06d6a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
            font-weight: bold;
        }
        .button {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
            transition: all 0.2s;
        }
        .button:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }
        .status {
            color: #4ade80;
            font-weight: 600;
            margin: 1rem 0;
        }
        .info {
            color: #94a3b8;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>ATLAS Server Test</h1>
        <div class="status">✅ Server is Running</div>
        <div class="info">Port: 8080</div>
        <div class="info">Time: <span id="time"></span></div>
        
        <div style="margin-top: 2rem;">
            <a href="/" class="button">🏠 Go to Homepage</a>
            <a href="/dashboard" class="button">🚀 Launch Dashboard</a>
            <a href="/debug" class="button">🔧 System Check</a>
        </div>
        
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <div class="info">If the buttons above don't work, the React app may have build issues.</div>
            <div class="info">This static page confirms the server is responding.</div>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        
        // Check if main app is working
        fetch('/')
            .then(response => {
                if (response.ok) {
                    console.log('Main app responding correctly');
                } else {
                    console.error('Main app error:', response.status);
                }
            })
            .catch(error => {
                console.error('Main app not accessible:', error);
            });
    </script>
</body>
</html>
