<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS AI - Health Operating System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            padding: 2rem;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #4ade80, #06d6a0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 2rem;
            box-shadow: 0 0 30px rgba(78, 222, 128, 0.4);
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 30px rgba(78, 222, 128, 0.4); }
            to { box-shadow: 0 0 50px rgba(78, 222, 128, 0.6); }
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #4ade80, #06d6a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            min-width: 250px;
            justify-content: center;
        }
        
        .btn.primary {
            background: linear-gradient(135deg, #4ade80, #06d6a0);
            color: #000;
            box-shadow: 0 8px 25px rgba(78, 222, 128, 0.3);
        }
        
        .btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(78, 222, 128, 0.4);
        }
        
        .btn.secondary {
            background: rgba(78, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(78, 222, 128, 0.3);
        }
        
        .btn.secondary:hover {
            background: rgba(78, 222, 128, 0.2);
            transform: translateY(-2px);
        }
        
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(78, 222, 128, 0.2);
            border-radius: 8px;
            font-size: 0.875rem;
        }
        
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>ATLAS AI</h1>
        <p>Your adaptive health command center with AI-powered insights, future predictions, and personalized recommendations.</p>
        
        <div class="links">
            <a href="atlas-demo.html" class="btn primary">
                📊 Launch Dashboard Demo
            </a>
            <a href="login.html" class="btn secondary">
                🔐 Authentication Portal
            </a>
        </div>
        
        <div class="status">
            <span class="pulse"></span>
            <strong>Server Status:</strong> Operational • Demo Mode Available • All Features Active
        </div>
    </div>
    
    <script>
        console.log('🧠 ATLAS AI Portal loaded');
        console.log('🚀 Demo available at /atlas-demo.html');
        console.log('🔐 Auth portal at /login.html');
    </script>
</body>
</html>
