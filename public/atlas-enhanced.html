<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS AI — Personal Health Operating System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: oklch(0.86 0.18 200);
            --primary-hover: oklch(0.82 0.18 200);
            --accent: oklch(0.86 0.15 160);
            --success: oklch(0.76 0.13 150);
            --warning: oklch(0.85 0.12 75);
            --danger: oklch(0.70 0.18 25);
            --background: oklch(0.08 0.02 270);
            --foreground: oklch(0.92 0.02 270);
            --muted: oklch(0.40 0.04 270);
            --border: oklch(0.25 0.04 270);
            --card: oklch(0.12 0.02 270);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--background);
            color: var(--foreground);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Enhanced Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.08;
            background-image: 
                linear-gradient(var(--primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--primary) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            animation: gridShift 20s linear infinite;
        }
        
        @keyframes gridShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }
        
        /* Enhanced Atmospheric Effects */
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .atmosphere::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -25%;
            width: 150%;
            height: 200%;
            background: radial-gradient(
                ellipse at center,
                rgba(78, 222, 128, 0.08) 0%,
                rgba(78, 222, 128, 0.04) 25%,
                transparent 50%
            );
            animation: float 15s ease-in-out infinite;
        }
        
        .atmosphere::after {
            content: '';
            position: absolute;
            top: 20%;
            right: -25%;
            width: 120%;
            height: 120%;
            background: radial-gradient(
                ellipse at center,
                rgba(6, 214, 160, 0.06) 0%,
                rgba(6, 214, 160, 0.03) 30%,
                transparent 60%
            );
            animation: float 20s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(30px, -30px) rotate(1deg) scale(1.1); }
            66% { transform: translate(-20px, 20px) rotate(-1deg) scale(0.9); }
        }
        
        /* Enhanced Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8, 8, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
